; CONFIG FILE
; GitHub repository: https://github.com/tukutt/venus-os_dbus-mqtt-solarsense-esphome
; remove semicolon ; to enable desired setting

[DEFAULT]
; Set logging level
; ERROR = shows errors only
; WARNING = shows ERROR and warnings
; INFO = shows WARNING and running functions
; DEBUG = shows INFO and data/values
; default: WARNING
logging = WARNING

; Device name shown in the Remote Console and VRM
; default: SolarSense 750
device_name = SolarSense 750

; Device VRM instance
; default: 40
device_instance = 40

; Watchdog: after how many seconds without any SolarSense MQTT message the
; sensor is marked as not connected (/Connected = 0), because the ESP32 is down
; or out of BLE range. The last measured values are KEPT (an absence of data is
; not a measured zero). The SolarSense also reports at night (irradiance 0), so
; the watchdog only fires on a real outage, never merely at sunset.
; default: 300
; value to disable watchdog: 0
timeout = 300


[MQTT]
; IP address or FQDN of the MQTT broker the ESP32 (ESPHome `mqtt:` component)
; publishes to. Typically your Mosquitto broker.
broker_address = IP_ADDR_OR_FQDN

; Port of the MQTT server
; default plaintext: 1883
; default TLS port: 8883
broker_port = 1883

; Enables TLS
; 0 = Disabled
; 1 = Enabled
;tls_enabled = 1

; Absolute path to the Certificate Authority certificate file that is to be treated as trusted by this client
;tls_path_to_ca = /data/keys/mosquitto.crt

; Disables verification of the server hostname in the server certificate
; 0 = Disabled
; 1 = Enabled
;tls_insecure = 1

; Username used for connection
;username = myuser

; Password used for connection
;password = mypassword

; ESPHome node name = the MQTT topic prefix the ESP publishes under, e.g.
; "esphome-ble-proxy". The driver subscribes to <base_topic>/+/+/state.
; OPTIONAL: leave it empty to subscribe broker-wide and match only on
; entity_prefix below - then nothing has to be changed here if you rename the
; ESP node. Setting it also enables the <base_topic>/status availability topic
; (online/offline) to drive /Connected.
; default: (empty)
;base_topic = esphome-ble-proxy

; Prefix of the SolarSense object_ids (the slugified ESPHome sensor names). Only
; entities whose object_id starts with this prefix are bridged - this is what
; isolates the SolarSense entities from the ESP's other (system) sensors. Check
; your real topics with:  mosquitto_sub -h <broker> -t '#' -v
; default: solarsense
entity_prefix = solarsense
